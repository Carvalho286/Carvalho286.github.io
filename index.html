<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D'Italia Ristorante – App Mockups</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background-color: #111;
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        padding: 20px 40px;
        background: #1a1a1a;
        border-bottom: 2px solid #2e7d32;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      header h1 {
        font-size: 22px;
        font-weight: 600;
      }

      header span {
        font-size: 14px;
        opacity: 0.7;
      }

      .iframe-container {
        flex: 1;
        padding: 20px;
      }

      iframe {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        border: none;
        background: white;
      }

      footer {
        padding: 10px;
        text-align: center;
        font-size: 13px;
        background: #1a1a1a;
        opacity: 0.6;
      }

      @media (max-width: 768px) {
        header {
          flex-direction: column;
          gap: 5px;
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>D'Italia Ristorante – App Mockups</h1>
      <span>Visualização do design da aplicação</span>
    </header>

    <div class="iframe-container">
      <iframe 
        src="https://embed.figma.com/design/keBKL69RT2n7bPLdAivGS9/Dinis?node-id=0-1&embed-host=share" 
        allowfullscreen>
      </iframe>
    </div>

    <footer>
      Caso não consiga visualizar corretamente, por favor abra num computador.
    </footer>
  </body>
</html>
